services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: codearena
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U arena -d codearena"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test:
        - CMD-SHELL
        - "redis-cli ping | grep -q PONG"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://arena:arena@postgres:5432/codearena
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
      JUDGE_WORK_DIR: /judge-work
      JUDGE_DOCKER_VOLUME: codearena-judge-work
      JUDGE_DOCKER_IMAGE: gcc:13-bookworm
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    volumes:
      - judge-work:/judge-work
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"require('http').get('http://localhost:5000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://arena:arena@postgres:5432/codearena
      REDIS_URL: redis://redis:6379
      SOCKET_URL: http://backend:5000
      JUDGE_WORK_DIR: /judge-work
      JUDGE_DOCKER_VOLUME: codearena-judge-work
      JUDGE_DOCKER_IMAGE: gcc:13-bookworm
      NODE_ENV: production
    volumes:
      - judge-work:/judge-work
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:5000
    env_file:
      - ./frontend/.env
    environment:
      BACKEND_INTERNAL_URL: http://backend:5000
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"require('http').get('http://localhost:3000', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  postgres:
  judge-work:
    name: codearena-judge-work
