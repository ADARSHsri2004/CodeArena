services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: codearena

    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile

    env_file:
      - ./backend/.env

    environment:
      REDIS_URL: redis://redis:6379
      SOCKET_URL: http://host.docker.internal:5000
      WORKER_SECRET: codearena-worker-secret
      JUDGE_DOCKER_IMAGE: gcc:13-bookworm
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    dns:
      - 8.8.8.8
      - 8.8.4.4

    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres:
